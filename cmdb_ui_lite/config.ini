# CMDB Lite 主配置文件
# 定义所有环境的配置选项

# ===========================================
# 开发环境配置
# ===========================================
[development]
ENV_NAME = development
API_BASE_URL = http://localhost:8000
API_TIMEOUT = 10000
BACKEND_PORT = 8000
FRONTEND_PORT = 3001
ENABLE_API_PROXY = false
DEBUG_MODE = true
LOG_LEVEL = info

# ===========================================
# SOLO云端环境配置
# ===========================================
[solo]
ENV_NAME = solo
API_BASE_URL = /
API_TIMEOUT = 10000
BACKEND_PORT = 8000
FRONTEND_PORT = 3000
ENABLE_API_PROXY = true
DEBUG_MODE = true
LOG_LEVEL = info

# ===========================================
# 生产环境配置
# ===========================================
[production]
ENV_NAME = production
API_BASE_URL = https://api.example.com
API_TIMEOUT = 30000
BACKEND_PORT = 8000
FRONTEND_PORT = 80
ENABLE_API_PROXY = false
DEBUG_MODE = false
LOG_LEVEL = warning

# ===========================================
# 默认环境
# ===========================================
[default]
default_env = development
auto_detect = true
